<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yonná Galvão</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Montserrat', sans-serif;

  min-height:100vh;

  background:url("bg.jpg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  overflow:hidden;

  position:relative;
}

/* OVERLAY */

.overlay{

  position:absolute;

  inset:0;

  background:
  linear-gradient(
    to bottom,
    rgba(0,0,0,0.10),
    rgba(0,0,0,0.15)
  );
}

/* CONTAINER */

.container{

  position:relative;

  z-index:2;

  width:100%;

  max-width:430px;

  height:100vh;

  margin:auto;

  display:flex;

  flex-direction:column;

  align-items:center;
}

/* LOGO */

.logo{

  width:360px;

  max-width:92%;

  margin-top:320px;

  filter:
  drop-shadow(0 4px 12px rgba(0,0,0,0.25));
}

/* BOTÃO */

.botao{

  width:340px;

  max-width:92%;

  margin-top:55px;

  transition:.3s;
}

.botao:hover{

  transform:scale(1.03);
}

.botao img{

  width:100%;

  display:block;

  filter:
  drop-shadow(0 0 18px rgba(164,247,197,0.55))
  drop-shadow(0 8px 20px rgba(0,0,0,0.25));
}

/* RODAPÉ */

.rodape{

  position:absolute;

  bottom:20px;

  width:100%;

  text-align:center;

  color:white;

  font-size:11px;

  font-weight:500;

  letter-spacing:1px;

  text-shadow:0 2px 8px rgba(0,0,0,0.35);
}

/* RESPONSIVO */

@media(max-width:480px){

  .logo{

    width:320px;

    margin-top:300px;
  }

  .botao{

    width:320px;

    margin-top:35px;
  }

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- LOGO -->

  <img src="nome.png" class="logo">

  <!-- BOTÃO -->

  <a href="https://yonnagalvao.github.io/YonnaGalvao/" class="botao">

    <img src="botao.png">

  </a>

</div>

<!-- RODAPÉ -->

<div class="rodape">

  Yonná Galvão © 2026 - Todos os direitos reservados

</div>

</body>
</html>
