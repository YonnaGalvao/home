<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yonná Galvão</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
}

.container{
    width:100%;
    max-width:760px;
    margin:auto;
    padding:10px;
}

/* ======================
   HERO
====================== */

.hero{
    position:relative;
    overflow:hidden;
    border-radius:35px 35px 0 0;
}

.hero img{
    width:100%;
    display:block;
}

.hero::after{

    content:'';

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:280px;

    background:
    linear-gradient(
        transparent,
        rgba(0,0,0,.98)
    );
}

.hero-text{

    position:absolute;

    bottom:45px;

    width:100%;

    text-align:center;

    z-index:5;
}

.hero-text h1{

    color:white;

    font-size:64px;

    font-weight:800;

    letter-spacing:6px;
}

.hero-text p{

    color:white;

    font-size:30px;

    font-weight:600;
}

/* ======================
   EXCLUSIVE CONTENT
====================== */

.banner{

    display:block;

    position:relative;

    margin-top:20px;

    overflow:hidden;

    border-radius:35px;

    text-decoration:none;

    color:white;

    transition:.3s;
}

.banner:hover{

    transform:scale(1.01);
}

.banner img{

    width:100%;

    display:block;
}

.banner::after{

    content:'';

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:120px;

    background:
    linear-gradient(
        transparent,
        rgba(0,0,0,.95)
    );
}

.banner-title{

    position:absolute;

    bottom:15px;

    width:100%;

    text-align:center;

    color:white;

    font-size:30px;

    font-weight:800;

    letter-spacing:5px;

    z-index:2;
}

/* ======================
   REDES SOCIAIS
====================== */

.redes{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:12px;

    margin-top:20px;
}

.card{

    position:relative;

    overflow:hidden;

    border-radius:30px;

    text-decoration:none;

    transition:.3s;
}

.card:hover{

    transform:scale(1.02);
}

.card img{

    width:100%;

    display:block;
}

.card::after{

    content:'';

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:130px;

    background:
    linear-gradient(
        transparent,
        rgba(0,0,0,.95)
    );
}

.card-info{

    position:absolute;

    bottom:18px;

    left:0;

    width:100%;

    z-index:5;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;
}

.card-info .icon{

    width:60px;

    height:60px;

    object-fit:contain;

    display:block;

    margin:0 auto 10px auto;
}

.card-info h3{

    color:white;

    font-size:20px;

    font-weight:700;

    letter-spacing:3px;
}

/* ======================
   KM2
====================== */

.km2{

    display:block;

    position:relative;

    margin-top:25px;

    overflow:hidden;

    border-radius:35px;

    text-decoration:none;

    transition:.3s;
}

.km2:hover{

    transform:scale(1.01);
}

.km2 img{

    width:100%;

    display:block;
}

.km2::after{

    content:'';

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:100%;

    background:
    linear-gradient(
        to right,
        rgba(0,0,0,.55),
        transparent
    );
}

.km2-info{

    position:absolute;

    left:20px;

    top:50%;

    transform:translateY(-50%);

    display:flex;

    align-items:center;

    gap:15px;

    z-index:5;
}

.km2-info img{

    width:55px;

    height:55px;

    object-fit:contain;
}

.km2-info span{

    color:white;

    font-size:24px;

    font-weight:700;
}

/* ======================
   RODAPÉ
====================== */

footer{

    text-align:center;

    color:white;

    padding:25px 0;

    font-size:16px;

    letter-spacing:2px;
}

/* ======================
   MOBILE
====================== */

@media(max-width:768px){

    .hero-text h1{
        font-size:34px;
        letter-spacing:3px;
    }

    .hero-text p{
        font-size:18px;
    }

    .banner-title{
        font-size:18px;
        letter-spacing:2px;
    }

    .card-info .icon{
        width:45px;
        height:45px;
    }

    .card-info h3{
        font-size:14px;
        letter-spacing:2px;
    }

    .km2-info span{
        font-size:18px;
    }

    .km2-info img{
        width:45px;
        height:45px;
    }

    footer{
        font-size:13px;
        padding:20px 10px;
    }
}

</style>

</head>

<body>

<div class="container">

    <!-- HERO -->

    <section class="hero">

        <img src="home/hero.jpg">

        <div class="hero-text">

            <h1>YONNÁ GALVÃO</h1>

            <p>@yonna.galvao</p>

        </div>

    </section>

    <!-- EXCLUSIVE CONTENT -->

    <a href="exclusivecontent.html" class="banner">

        <img src="home/exclusive.jpg">

        <div class="banner-title">

            EXCLUSIVE CONTENT

        </div>

    </a>

    <!-- REDES -->

    <section class="redes">

        <a href="https://www.instagram.com/yonna.galvao?igsh=MWU5bXRycTRraGY4ZA%3D%3D&utm_source=qr" class="card">

            <img src="home/instagram.jpg">

            <div class="card-info">

                <img src="home/instagram-icon.png" class="icon">

                <h3>INSTAGRAM</h3>

            </div>

        </a>

        <a href="https://www.tiktok.com/@yonna.galvao?_r=1&_t=ZS-95fia1yuOFp" class="card">

            <img src="home/tiktok.jpg">

            <div class="card-info">

                <img src="home/tiktok-icon.png" class="icon">

                <h3>TIKTOK</h3>

            </div>

        </a>

        <a href="https://x.com/euyonnagalvao?s=21" class="card">

            <img src="home/twitter.jpg">

            <div class="card-info">

                <img src="home/x-icon.png" class="icon">

                <h3>TWITTER</h3>

            </div>

        </a>

    </section>

    <!-- KM2 -->

    <a href="https://apps.apple.com/br/app/km-2/id6760730085" class="km2">

        <img src="home/km2.jpg">

        <div class="km2-info">

            <img src="home/km2-icon.png">

            <span>KM2</span>

        </div>

    </a>

    <!-- RODAPÉ -->

    <footer>

        Yonna Galvão © 2026 - Todos os direitos reservados

    </footer>

</div>

</body>

</html>
